name: CI Build Verification

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  backend-build:
    name: Backend Build & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Backend Dependencies
        run: dotnet restore backend/src/TrackTrace.Api/TrackTrace.Api.csproj

      - name: Build Backend
        run: dotnet build backend/src/TrackTrace.Api/TrackTrace.Api.csproj --configuration Release --no-restore

  frontend-build:
    name: Frontend Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Typecheck Frontend
        working-directory: ./frontend
        run: npm run typecheck

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://track-api.alperates.com.tr
