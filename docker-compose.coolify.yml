version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: track_trace_db
    environment:
      POSTGRES_DB: track_trace
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - coolify
    volumes:
      - track_trace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: track_trace_api
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=track_trace;Username=${DB_USER:-postgres};Password=${DB_PASSWORD}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__ExpiryHours=${JWT_EXPIRY_HOURS:-24}
      - Seed__AdminUsername=${ADMIN_USERNAME:-admin}
      - Seed__AdminPassword=${ADMIN_PASSWORD}
      - Seed__AdminName=${ADMIN_NAME:-System Administrator}
      - MaxUploadMb=${MAX_UPLOAD_MB:-100}
      - APP_VERSION=${APP_VERSION:-v0.1.0-mvp}
      - BUILD_DATE=${BUILD_DATE}
      - GIT_COMMIT_SHA=${GIT_COMMIT_SHA}
    networks:
      - coolify
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # API HTTPS Router
      - "traefik.http.routers.track-trace-api.entrypoints=https"
      - "traefik.http.routers.track-trace-api.rule=Host(`track-api.alperates.com.tr`)"
      - "traefik.http.routers.track-trace-api.service=track-trace-api"
      - "traefik.http.routers.track-trace-api.middlewares=crowdsec@file"
      - "traefik.http.routers.track-trace-api.tls=true"
      - "traefik.http.routers.track-trace-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.track-trace-api.loadbalancer.server.port=8080"
      # API HTTP Router & Redirect Middleware
      - "traefik.http.routers.track-trace-api-http.entrypoints=http"
      - "traefik.http.routers.track-trace-api-http.rule=Host(`track-api.alperates.com.tr`)"
      - "traefik.http.routers.track-trace-api-http.service=track-trace-api"
      - "traefik.http.routers.track-trace-api-http.middlewares=track-trace-api-https-redirect,crowdsec@file"
      - "traefik.http.middlewares.track-trace-api-https-redirect.redirectscheme.scheme=https"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=https://track-api.alperates.com.tr
    container_name: track_trace_frontend
    networks:
      - coolify
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      # Frontend HTTPS Router
      - "traefik.http.routers.track-trace-frontend.entrypoints=https"
      - "traefik.http.routers.track-trace-frontend.rule=Host(`track.alperates.com.tr`)"
      - "traefik.http.routers.track-trace-frontend.service=track-trace-frontend"
      - "traefik.http.routers.track-trace-frontend.middlewares=crowdsec@file"
      - "traefik.http.routers.track-trace-frontend.tls=true"
      - "traefik.http.routers.track-trace-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.track-trace-frontend.loadbalancer.server.port=80"
      # Frontend HTTP Router & Redirect Middleware
      - "traefik.http.routers.track-trace-frontend-http.entrypoints=http"
      - "traefik.http.routers.track-trace-frontend-http.rule=Host(`track.alperates.com.tr`)"
      - "traefik.http.routers.track-trace-frontend-http.service=track-trace-frontend"
      - "traefik.http.routers.track-trace-frontend-http.middlewares=track-trace-frontend-https-redirect,crowdsec@file"
      - "traefik.http.middlewares.track-trace-frontend-https-redirect.redirectscheme.scheme=https"

networks:
  coolify:
    external: true

volumes:
  track_trace_pgdata:
    name: track_trace_pgdata
